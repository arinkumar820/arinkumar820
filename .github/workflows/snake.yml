name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: arinkumar820
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#00E5FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00E5FF&color_dots=#0D1117,#0E4429,#006D32,#26A641,#39D353

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
